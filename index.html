<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文讀</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F7F5F0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* 해서(제첨·워드마크·char 대형 한자 전용) — 콘텐츠 한자만 서브셋해 self-host (scripts/subset-font.mjs) */
    @font-face {
      font-family: 'LXGW WenKai TC';
      src: url('fonts/wenkai-tc-sub.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    body {
      font-family: 'Pretendard Variable', Pretendard, 'Noto Sans KR', 'Noto Sans TC', 'Noto Sans SC', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    }
    body { background: #F7F5F0; color: #1C1917; transition: background 0.4s ease; }
    body.anki-mode { background: #EBF1F8; }
    /* 한자 텍스트 — body와 동일한 고딕 사슬(KR→TC→SC 같은 뼈대 폴백, 벽자에도 획 스타일 유지). 명조 전면 제거 */
    .hanja { font-family: 'Pretendard Variable', Pretendard, 'Noto Sans KR', 'Noto Sans TC', 'Noto Sans SC', -apple-system, 'Apple SD Gothic Neo', sans-serif; }
    /* 해서 — 홈 워드마크·표지 제첨·char 카드 대형 한자 전용 (16px 미만·학습 본문 금지) */
    .kai { font-family: 'LXGW WenKai TC', 'LXGW WenKai', 'Noto Sans KR', 'Noto Sans TC', 'Noto Sans SC', sans-serif; font-weight: 400; }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen-enter { animation: screenIn 0.22s ease both; }
    .stagger > * { animation: screenIn 0.28s ease both; }
    .stagger > *:nth-child(1) { animation-delay: 40ms; }
    .stagger > *:nth-child(2) { animation-delay: 100ms; }
    .stagger > *:nth-child(3) { animation-delay: 160ms; }
    .stagger > *:nth-child(4) { animation-delay: 220ms; }
    .stagger > *:nth-child(5) { animation-delay: 280ms; }
    .stagger > *:nth-child(6) { animation-delay: 340ms; }
    ruby { ruby-position: under; }
    rt { margin-top: 4px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-12">
  <div id="app" class="w-full flex items-center justify-center"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
