<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文讀</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    body { background: #F7F5F0; color: #1C1917; transition: background 0.4s ease; }
    body.anki-mode { background: #EBF1F8; }
    .hanja { font-family: 'Noto Serif KR', 'Noto Serif SC', serif; }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen-enter { animation: screenIn 0.22s ease both; }
    .stagger > * { animation: screenIn 0.28s ease both; }
    .stagger > *:nth-child(1) { animation-delay: 40ms; }
    .stagger > *:nth-child(2) { animation-delay: 100ms; }
    .stagger > *:nth-child(3) { animation-delay: 160ms; }
    .stagger > *:nth-child(4) { animation-delay: 220ms; }
    .stagger > *:nth-child(5) { animation-delay: 280ms; }
    .stagger > *:nth-child(6) { animation-delay: 340ms; }
    ruby { ruby-position: under; }
    rt { margin-top: 4px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-12">
  <div id="app" class="w-full flex items-center justify-center"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
